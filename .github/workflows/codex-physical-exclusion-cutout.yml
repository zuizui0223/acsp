name: Codex physical exclusion cutout

on:
  push:
    paths:
      - .github/workflows/codex-physical-exclusion-cutout.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Patch Streamlit app
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          path = Path('gbif_fieldmap_builder_app.py')
          s = path.read_text(encoding='utf-8')

          new_prediction = '''def prediction_area_geometry(occ: pd.DataFrame, mode: str, buffer_km: float, rectangle_margin_km: float, excluded_occ: Optional[pd.DataFrame] = None, exclusion_buffer_km: float = 0.0):
              points = [Point(float(row["_longitude"]), float(row["_latitude"])) for _, row in occ.iterrows()]
              if not points:
                  return None
              buffer_deg = max(km_to_deg(buffer_km), 0.0001)
              if mode == "buffer":
                  geom = unary_union([p.buffer(buffer_deg) for p in points])
              elif mode == "convex hull":
                  geom = points[0].buffer(buffer_deg) if len(points) == 1 else MultiPoint(points).convex_hull.buffer(buffer_deg)
              else:
                  margin = km_to_deg(rectangle_margin_km)
                  geom = box(float(occ["_longitude"].min()) - margin, float(occ["_latitude"].min()) - margin, float(occ["_longitude"].max()) + margin, float(occ["_latitude"].max()) + margin)
              if excluded_occ is not None and not excluded_occ.empty and exclusion_buffer_km > 0:
                  cutout_deg = max(km_to_deg(exclusion_buffer_km), 0.0001)
                  cutouts = unary_union([Point(float(row["_longitude"]), float(row["_latitude"])).buffer(cutout_deg) for _, row in excluded_occ.iterrows()])
                  geom = geom.difference(cutouts)
              return geom


          def excluded_occurrences_from_ids(occ_raw: pd.DataFrame, excluded_ids: set[int]) -> pd.DataFrame:
              if occ_raw.empty or not excluded_ids:
                  return occ_raw.iloc[0:0].copy()
              return occ_raw[occ_raw["_row_id"].astype(int).isin(set(map(int, excluded_ids)))].copy()


          '''
          new_prediction = '\n'.join(line[10:] if line.startswith('          ') else line for line in new_prediction.splitlines()) + '\n'
          s, n = re.subn(r'def prediction_area_geometry\(.*?\n\ndef make_sdm_extent_preview_map\(', new_prediction + 'def make_sdm_extent_preview_map(', s, count=1, flags=re.S)
          if n != 1:
              raise SystemExit('prediction_area_geometry block replacement failed')

          s = s.replace(
              'def generate_land_points(occ: pd.DataFrame, n_points: int, area_mode: str, buffer_km: float, rectangle_margin_km: float, random_state: int = 42, status=None) -> pd.DataFrame:',
              'def generate_land_points(occ: pd.DataFrame, n_points: int, area_mode: str, buffer_km: float, rectangle_margin_km: float, excluded_occ: Optional[pd.DataFrame] = None, exclusion_buffer_km: float = 0.0, random_state: int = 42, status=None) -> pd.DataFrame:',
          )
          s = s.replace('    geom = prediction_area_geometry(occ, area_mode, buffer_km, rectangle_margin_km)\n    if geom is None:\n        return pd.DataFrame(columns=["latitude", "longitude"])', '    geom = prediction_area_geometry(occ, area_mode, buffer_km, rectangle_margin_km, excluded_occ, exclusion_buffer_km)\n    if geom is None or geom.is_empty:\n        return pd.DataFrame(columns=["latitude", "longitude"])', 1)

          s = s.replace(
              'def build_presence_background(occ: pd.DataFrame, n_background: int, area_mode: str, buffer_km: float, rectangle_margin_km: float, status=None) -> pd.DataFrame:',
              'def build_presence_background(occ: pd.DataFrame, n_background: int, area_mode: str, buffer_km: float, rectangle_margin_km: float, excluded_occ: Optional[pd.DataFrame] = None, exclusion_buffer_km: float = 0.0, status=None) -> pd.DataFrame:',
          )
          s = s.replace('    bg = generate_land_points(occ, n_background, area_mode, buffer_km, rectangle_margin_km, status=status)', '    bg = generate_land_points(occ, n_background, area_mode, buffer_km, rectangle_margin_km, excluded_occ, exclusion_buffer_km, status=status)', 1)

          s = s.replace(
              'def build_predict_map(occ: pd.DataFrame, variables: list[str], resolution: str, sdm_result: dict[str, Any], area_mode: str, buffer_km: float, rectangle_margin_km: float, max_pixels: int, status=None) -> tuple[dict[str, Any], pd.DataFrame]:',
              'def build_predict_map(occ: pd.DataFrame, variables: list[str], resolution: str, sdm_result: dict[str, Any], area_mode: str, buffer_km: float, rectangle_margin_km: float, max_pixels: int, excluded_occ: Optional[pd.DataFrame] = None, exclusion_buffer_km: float = 0.0, status=None) -> tuple[dict[str, Any], pd.DataFrame]:',
          )
          s = s.replace('    geom = prediction_area_geometry(occ, area_mode, buffer_km, rectangle_margin_km)\n    if geom is None:\n        raise RuntimeError("Prediction area could not be generated.")', '    geom = prediction_area_geometry(occ, area_mode, buffer_km, rectangle_margin_km, excluded_occ, exclusion_buffer_km)\n    if geom is None or geom.is_empty:\n        raise RuntimeError("Prediction area could not be generated.")', 1)

          old_ui = '''    area_mode = st.selectbox("Area to predict", AREA_MODES, index=2, help="All three modes are land-only: buffer, convex hull, or bounding box.", key="sdm_area_mode")
              c1, c2 = st.columns(2)
              buffer_km = c1.number_input("Buffer radius for buffer / convex hull (km)", min_value=0.1, max_value=500.0, value=10.0, step=1.0, key="sdm_buffer_km")
              rectangle_margin_km = c2.number_input("Margin around bounding box (km)", min_value=0.0, max_value=500.0, value=20.0, step=5.0, key="sdm_rectangle_margin_km")
              extent_geom = prediction_area_geometry(occ, area_mode, float(buffer_km), float(rectangle_margin_km))
              if extent_geom is not None:
          '''
          old_ui = '\n'.join(line[10:] if line.startswith('          ') else line for line in old_ui.splitlines()) + '\n'
          new_ui = '''    area_mode = st.selectbox("Area to predict", AREA_MODES, index=2, help="All three modes are land-only: buffer, convex hull, or bounding box.", key="sdm_area_mode")
              c1, c2, c3 = st.columns(3)
              buffer_km = c1.number_input("Buffer radius for buffer / convex hull (km)", min_value=0.1, max_value=500.0, value=10.0, step=1.0, key="sdm_buffer_km")
              rectangle_margin_km = c2.number_input("Margin around bounding box (km)", min_value=0.0, max_value=500.0, value=20.0, step=5.0, key="sdm_rectangle_margin_km")
              exclusion_buffer_km = c3.number_input("Red-point cutout radius (km)", min_value=0.1, max_value=100.0, value=1.0, step=0.5, key="sdm_exclusion_cutout_km", help="Red excluded records are physically cut out of the prediction extent by this radius.")
              excluded_occ = excluded_occurrences_from_ids(occ_raw, active_excluded_ids)
              extent_geom = prediction_area_geometry(occ, area_mode, float(buffer_km), float(rectangle_margin_km), excluded_occ, float(exclusion_buffer_km))
              if extent_geom is not None and not extent_geom.is_empty:
          '''
          new_ui = '\n'.join(line[10:] if line.startswith('          ') else line for line in new_ui.splitlines()) + '\n'
          if old_ui not in s:
              raise SystemExit('SDM extent UI anchor not found')
          s = s.replace(old_ui, new_ui, 1)

          old_map_end = '''        st_folium(
                  make_sdm_extent_preview_map(occ_raw, occ, active_excluded_ids, extent_geom, area_mode),
                  width=None,
                  height=460,
                  returned_objects=[],
                  key=f"sdm_extent_preview_map_{area_mode}",
              )
          
              st.subheader("SDM settings")
          '''
          old_map_end = '\n'.join(line[10:] if line.startswith('          ') else line for line in old_map_end.splitlines()) + '\n'
          new_map_end = '''        st_folium(
                  make_sdm_extent_preview_map(occ_raw, occ, active_excluded_ids, extent_geom, area_mode),
                  width=None,
                  height=460,
                  returned_objects=[],
                  key=f"sdm_extent_preview_map_{area_mode}",
              )
              else:
                  st.error("The SDM prediction extent is empty after red-point cutouts. Reduce the red-point cutout radius or choose another extent mode.")
          
              st.subheader("SDM settings")
          '''
          new_map_end = '\n'.join(line[10:] if line.startswith('          ') else line for line in new_map_end.splitlines()) + '\n'
          if old_map_end in s:
              s = s.replace(old_map_end, new_map_end, 1)

          s = s.replace('        elif set(occ["_row_id"].astype(int)).intersection(active_excluded_ids):\n            st.error("Excluded row IDs are still present in the SDM input. SDM was stopped to prevent using excluded occurrences.")', '        elif extent_geom is None or extent_geom.is_empty:\n            st.error("The SDM prediction extent is empty after red-point cutouts. SDM was stopped.")\n        elif set(occ["_row_id"].astype(int)).intersection(active_excluded_ids):\n            st.error("Excluded row IDs are still present in the SDM input. SDM was stopped to prevent using excluded occurrences.")', 1)
          s = s.replace('pb = build_presence_background(occ, int(n_background), area_mode, float(buffer_km), float(rectangle_margin_km), status)', 'pb = build_presence_background(occ, int(n_background), area_mode, float(buffer_km), float(rectangle_margin_km), excluded_occ, float(exclusion_buffer_km), status)', 1)
          s = s.replace('overlay, pred_table = build_predict_map(occ, kept_vars, resolution, sdm_result, area_mode, float(buffer_km), float(rectangle_margin_km), int(max_pixels), status)', 'overlay, pred_table = build_predict_map(occ, kept_vars, resolution, sdm_result, area_mode, float(buffer_km), float(rectangle_margin_km), int(max_pixels), excluded_occ, float(exclusion_buffer_km), status)', 1)

          required = ['Red-point cutout radius', 'excluded_occurrences_from_ids', 'geom.difference(cutouts)', 'excluded_occ, float(exclusion_buffer_km)']
          missing = [x for x in required if x not in s]
          if missing:
              raise SystemExit(f'Missing required patch markers: {missing}')
          path.write_text(s, encoding='utf-8')
          PY
          python -m py_compile gbif_fieldmap_builder_app.py
      - name: Commit patch and remove workflow
        run: |
          git config user.name "codex-bot"
          git config user.email "codex-bot@users.noreply.github.com"
          git add gbif_fieldmap_builder_app.py
          git commit -m "Physically cut excluded points from SDM extent"
          git rm .github/workflows/codex-physical-exclusion-cutout.yml
          git commit -m "Remove one-time physical exclusion workflow"
          git push

name: Codex force Streamlit redeploy

on:
  push:
    paths:
      - .github/workflows/codex-force-streamlit-redeploy.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Add visible build marker
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('gbif_fieldmap_builder_app.py')
          s = path.read_text(encoding='utf-8')
          if 'APP_BUILD_ID = ' not in s:
              s = s.replace('APP_TITLE = "GBIF FieldMap Builder"\n', 'APP_TITLE = "GBIF FieldMap Builder"\nAPP_BUILD_ID = "physical-exclusion-cutout-20260529"\n', 1)
          else:
              s = s.replace('APP_BUILD_ID = "physical-exclusion-cutout-20260529"', 'APP_BUILD_ID = "physical-exclusion-cutout-20260529"')
          if 'st.sidebar.caption(f"Build: {APP_BUILD_ID}")' not in s:
              s = s.replace('    st.sidebar.header("Data source")\n', '    st.sidebar.caption(f"Build: {APP_BUILD_ID}")\n    st.sidebar.header("Data source")\n', 1)
          required = ['APP_BUILD_ID = "physical-exclusion-cutout-20260529"', 'st.sidebar.caption(f"Build: {APP_BUILD_ID}")', 'Red-point cutout radius', 'geom.difference(cutouts)']
          missing = [x for x in required if x not in s]
          if missing:
              raise SystemExit(f'Missing expected markers: {missing}')
          path.write_text(s, encoding='utf-8')
          PY
          python -m py_compile gbif_fieldmap_builder_app.py
      - name: Commit marker and remove workflow
        run: |
          git config user.name "codex-bot"
          git config user.email "codex-bot@users.noreply.github.com"
          git add gbif_fieldmap_builder_app.py
          git commit -m "Add Streamlit build marker for redeploy"
          git rm .github/workflows/codex-force-streamlit-redeploy.yml
          git commit -m "Remove one-time redeploy workflow"
          git push

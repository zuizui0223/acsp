name: Random taxa occupancy geometry confirmation

on:
  pull_request:
    paths:
      - acsp/occupancy_geometry.py
      - benchmark_random_taxa_occupancy_geometry.py
      - benchmark_random_taxa_occupancy_geometry_v2.py
      - benchmark_general_random_taxa_regions.py
      - finalize_occupancy_geometry_confirmation.py
      - .github/workflows/random-occupancy-geometry-confirmation.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  confirm-random-taxa-geometry:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ACSP
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run frozen confirmation cohort
        run: |
          python benchmark_random_taxa_occupancy_geometry_v2.py \
            --output benchmark_results/random_taxa_occupancy_geometry_confirmation \
            --pairs 12 \
            --records-per-pair 120 \
            --minimum-records 20 \
            --facet-limit 180 \
            --repeats 30 \
            --training-fraction 0.70 \
            --random-draws 200 \
            --minimum-unique-states 4 \
            --minimum-unique-fraction 0.0 \
            --seed 20260723
      - name: Finalize pilot confirmation
        run: |
          python finalize_occupancy_geometry_confirmation.py \
            --directory benchmark_results/random_taxa_occupancy_geometry_confirmation \
            --minimum-technical-eligibility-fraction 0.60 \
            --minimum-informative-among-eligible 0.75
      - name: Check confirmation outputs
        run: |
          test -s benchmark_results/random_taxa_occupancy_geometry_confirmation/predeclared_taxon_region_pairs.csv
          test -s benchmark_results/random_taxa_occupancy_geometry_confirmation/pair_status.csv
          test -s benchmark_results/random_taxa_occupancy_geometry_confirmation/geometry_repeat_results.csv
          test -s benchmark_results/random_taxa_occupancy_geometry_confirmation/geometry_pair_summary.csv
          test -s benchmark_results/random_taxa_occupancy_geometry_confirmation/occupancy_geometry_benchmark_summary.json
      - name: Upload confirmation artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: random-taxa-occupancy-geometry-confirmation
          path: benchmark_results/random_taxa_occupancy_geometry_confirmation
          if-no-files-found: error

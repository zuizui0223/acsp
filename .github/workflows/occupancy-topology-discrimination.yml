name: Occupancy topology discrimination

on:
  pull_request:
    paths:
      - acsp/occupancy_geometry.py
      - benchmark_occupancy_topology_discrimination.py
      - .github/workflows/occupancy-topology-discrimination.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  discriminate-topology:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ACSP
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run matched-moment topology benchmark
        run: |
          python benchmark_occupancy_topology_discrimination.py \
            --output benchmark_results/occupancy_topology_discrimination \
            --repeats 100 \
            --points 120 \
            --seed 20260731
      - name: Check outputs
        run: |
          test -s benchmark_results/occupancy_topology_discrimination/topology_repeat_results.csv
          test -s benchmark_results/occupancy_topology_discrimination/topology_scenario_summary.csv
          test -s benchmark_results/occupancy_topology_discrimination/topology_benchmark_summary.json
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: occupancy-topology-discrimination
          path: benchmark_results/occupancy_topology_discrimination
          if-no-files-found: error

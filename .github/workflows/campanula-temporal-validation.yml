name: Campanula temporal external validation

on:
  push:
    branches:
      - agent/campanula-temporal-external-validation
      - agent/gap-separated-patch-search
    paths:
      - field_validation/campanula_microdonta/run_temporal_external_validation.py
      - field_validation/campanula_microdonta/run_gap_patch_external_validation.py
      - field_validation/campanula_microdonta/run_occurrence_patch_connectivity_validation.py
      - field_validation/campanula_microdonta/run_occurrence_patch_connectivity_sensitivity.py
      - field_validation/campanula_microdonta/rank_robust_near_disconnected_patches.py
      - field_validation/campanula_microdonta/run_robust_patch_portfolio_validation.py
      - field_validation/campanula_microdonta/run_corridor_evidence_sensitivity.py
      - field_validation/campanula_microdonta/run_travel_constrained_patch_baselines.py
      - field_validation/campanula_microdonta/normalize_gap_validation_inputs.py
      - field_validation/campanula_microdonta/compare_area_balanced_update.py
      - field_validation/campanula_microdonta/locations_2026.csv
      - acsp/**
      - test_area_selection.py
      - test_gap_input_normalization.py
      - test_gap_validation.py
      - test_occurrence_patch_connectivity.py
      - gbif_fieldmap_builder_app.py
      - .github/workflows/campanula-temporal-validation.yml
  pull_request:
    paths:
      - field_validation/campanula_microdonta/run_temporal_external_validation.py
      - field_validation/campanula_microdonta/run_gap_patch_external_validation.py
      - field_validation/campanula_microdonta/run_occurrence_patch_connectivity_validation.py
      - field_validation/campanula_microdonta/run_occurrence_patch_connectivity_sensitivity.py
      - field_validation/campanula_microdonta/rank_robust_near_disconnected_patches.py
      - field_validation/campanula_microdonta/run_robust_patch_portfolio_validation.py
      - field_validation/campanula_microdonta/run_corridor_evidence_sensitivity.py
      - field_validation/campanula_microdonta/run_travel_constrained_patch_baselines.py
      - field_validation/campanula_microdonta/normalize_gap_validation_inputs.py
      - field_validation/campanula_microdonta/compare_area_balanced_update.py
      - field_validation/campanula_microdonta/locations_2026.csv
      - acsp/**
      - test_area_selection.py
      - test_gap_input_normalization.py
      - test_gap_validation.py
      - test_occurrence_patch_connectivity.py
      - gbif_fieldmap_builder_app.py
      - .github/workflows/campanula-temporal-validation.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ACSP
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      - name: Test selection and input normalization
        run: |
          python -m unittest test_area_selection.py
          python -m unittest test_gap_input_normalization.py
          python -m unittest test_gap_validation.py
          python -m unittest test_occurrence_patch_connectivity.py
      - name: Run frozen baseline validation
        run: |
          python field_validation/campanula_microdonta/run_temporal_external_validation.py \
            --output field_validation/campanula_microdonta/temporal_external_results \
            --gbif-cap 2000 \
            --random-iterations 10000 \
            --seed 20260715 \
            --cluster-radius-m 500
      - name: Run general area-balanced update
        run: |
          python field_validation/campanula_microdonta/compare_area_balanced_update.py \
            --results field_validation/campanula_microdonta/temporal_external_results \
            --random-iterations 10000 \
            --seed 20260715
      - name: Normalize gap-validation inputs
        run: |
          python field_validation/campanula_microdonta/normalize_gap_validation_inputs.py \
            --results field_validation/campanula_microdonta/temporal_external_results
      - name: Run gap-patch external validation
        run: |
          python field_validation/campanula_microdonta/run_gap_patch_external_validation.py \
            --results field_validation/campanula_microdonta/temporal_external_results
      - name: Run occurrence-patch connectivity validation
        run: |
          python field_validation/campanula_microdonta/run_occurrence_patch_connectivity_validation.py \
            --results field_validation/campanula_microdonta/temporal_external_results
      - name: Run occurrence-patch connectivity sensitivity
        run: |
          python field_validation/campanula_microdonta/run_occurrence_patch_connectivity_sensitivity.py \
            --results field_validation/campanula_microdonta/temporal_external_results
      - name: Rank robust near-disconnected patches
        run: |
          python field_validation/campanula_microdonta/rank_robust_near_disconnected_patches.py \
            --results field_validation/campanula_microdonta/temporal_external_results
      - name: Run cumulative robust patch portfolio validation
        run: |
          python field_validation/campanula_microdonta/run_robust_patch_portfolio_validation.py \
            --results field_validation/campanula_microdonta/temporal_external_results \
            --random-draws 2000 \
            --seed 20260719
      - name: Run corridor evidence sensitivity
        run: |
          python field_validation/campanula_microdonta/run_corridor_evidence_sensitivity.py \
            --results field_validation/campanula_microdonta/temporal_external_results
      - name: Run equal-travel patch baselines
        run: |
          python field_validation/campanula_microdonta/run_travel_constrained_patch_baselines.py \
            --results field_validation/campanula_microdonta/temporal_external_results \
            --random-draws 200 \
            --seed 20260718
      - name: Check primary outputs
        run: |
          test -s field_validation/campanula_microdonta/temporal_external_results/gbif_training_occurrences_through_2025.csv
          test -s field_validation/campanula_microdonta/temporal_external_results/distance_excluded_candidate_pool.csv
          test -s field_validation/campanula_microdonta/temporal_external_results/frozen_acsp_top5.csv
          test -s field_validation/campanula_microdonta/temporal_external_results/validation_summary.json
          test -s field_validation/campanula_microdonta/temporal_external_results/updated_area_balanced_top5.csv
          test -s field_validation/campanula_microdonta/temporal_external_results/baseline_vs_area_balanced_comparison.csv
          test -s field_validation/campanula_microdonta/temporal_external_results/algorithm_update_summary.json
          test -s field_validation/campanula_microdonta/temporal_external_results/gap_patch_members_with_barriers.csv
          test -s field_validation/campanula_microdonta/temporal_external_results/gap_patch_summary.csv
          test -s field_validation/campanula_microdonta/temporal_external_results/gap_patch_all_field_cluster_recovery.csv
          test -s field_validation/campanula_microdonta/temporal_external_results/gap_patch_travel_sensitivity.csv
          test -s field_validation/campanula_microdonta/temporal_external_results/gap_patch_external_validation_summary.json
          test -s field_validation/campanula_microdonta/temporal_external_results/known_occurrence_patch_members.csv
          test -s field_validation/campanula_microdonta/temporal_external_results/candidate_patch_occurrence_connectivity.csv
          test -s field_validation/campanula_microdonta/temporal_external_results/occurrence_patch_connectivity_cluster_recovery.csv
          test -s field_validation/campanula_microdonta/temporal_external_results/occurrence_patch_connectivity_summary.csv
          test -s field_validation/campanula_microdonta/temporal_external_results/occurrence_patch_connectivity_validation_summary.json
          test -s field_validation/campanula_microdonta/temporal_external_results/occurrence_patch_connectivity_sensitivity.csv
          test -s field_validation/campanula_microdonta/temporal_external_results/occurrence_patch_labels_by_setting.csv
          test -s field_validation/campanula_microdonta/temporal_external_results/occurrence_patch_label_stability.csv
          test -s field_validation/campanula_microdonta/temporal_external_results/robust_near_disconnected_patch_ranking.csv
          test -s field_validation/campanula_microdonta/temporal_external_results/robust_near_disconnected_patch_ranking_summary.json
          test -s field_validation/campanula_microdonta/temporal_external_results/robust_patch_portfolio_draws.csv
          test -s field_validation/campanula_microdonta/temporal_external_results/robust_patch_portfolio_comparison.csv
          test -s field_validation/campanula_microdonta/temporal_external_results/corridor_evidence_sensitivity.csv
          test -s field_validation/campanula_microdonta/temporal_external_results/corridor_patch_labels_by_setting.csv
          test -s field_validation/campanula_microdonta/temporal_external_results/corridor_patch_label_stability.csv
          test -s field_validation/campanula_microdonta/temporal_external_results/travel_constrained_patch_baseline_draws.csv
          test -s field_validation/campanula_microdonta/temporal_external_results/travel_constrained_patch_baseline_comparison.csv
      - name: Upload validation outputs
        uses: actions/upload-artifact@v4
        with:
          name: campanula-temporal-external-validation
          path: field_validation/campanula_microdonta/temporal_external_results
          if-no-files-found: error
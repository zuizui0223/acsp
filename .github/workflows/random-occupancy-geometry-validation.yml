name: Random taxa occupancy geometry validation

on:
  pull_request:
    paths:
      - acsp/occupancy_geometry.py
      - benchmark_random_taxa_occupancy_geometry.py
      - benchmark_general_random_taxa_regions.py
      - test_occupancy_geometry.py
      - .github/workflows/random-occupancy-geometry-validation.yml
  workflow_dispatch:
    inputs:
      pairs:
        description: Number of random taxon-region pairs
        required: false
        default: "8"

permissions:
  contents: read

jobs:
  validate-random-taxa-geometry:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ACSP
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Test occupancy geometry
        run: python -m pytest -q test_occupancy_geometry.py
      - name: Run random taxon-region geometry benchmark
        run: |
          python benchmark_random_taxa_occupancy_geometry.py \
            --output benchmark_results/random_taxa_occupancy_geometry \
            --pairs "${{ github.event.inputs.pairs || '8' }}" \
            --records-per-pair 120 \
            --minimum-records 20 \
            --facet-limit 120 \
            --repeats 30 \
            --training-fraction 0.70 \
            --random-draws 100 \
            --seed 20260716
      - name: Check auditable outputs
        run: |
          test -s benchmark_results/random_taxa_occupancy_geometry/predeclared_taxon_region_pairs.csv
          test -s benchmark_results/random_taxa_occupancy_geometry/pair_status.csv
          test -s benchmark_results/random_taxa_occupancy_geometry/geometry_repeat_results.csv
          test -s benchmark_results/random_taxa_occupancy_geometry/geometry_pair_summary.csv
          test -s benchmark_results/random_taxa_occupancy_geometry/occupancy_geometry_benchmark_summary.json
      - name: Upload random validation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: random-taxa-occupancy-geometry
          path: benchmark_results/random_taxa_occupancy_geometry
          if-no-files-found: error

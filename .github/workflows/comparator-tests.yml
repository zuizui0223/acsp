name: Comparator tests

on:
  push:
    paths:
      - acsp/comparator_*.py
      - test_comparator_*.py
      - validation/standard_baseline_protocol.json
      - .github/workflows/comparator-tests.yml
  pull_request:
    paths:
      - acsp/comparator_*.py
      - test_comparator_*.py
      - validation/standard_baseline_protocol.json
      - .github/workflows/comparator-tests.yml

permissions:
  contents: read

jobs:
  comparator-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ACSP
        run: python -m pip install -e .
      - name: Run focused comparator tests
        shell: bash
        run: |
          set -o pipefail
          python -m unittest -v \
            test_comparator_benchmark.py \
            test_comparator_export.py 2>&1 | tee comparator-tests.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: comparator-tests-log
          path: comparator-tests.log
          if-no-files-found: error
          retention-days: 7
